name: Release

# Packs every SDK / library workspace into a tarball, builds the Python SDK
# wheel + sdist, and attaches everything to a GitHub Release. No npm/PyPI publish.
#
# Triggers:
#   - tag `v*`              -> full repo release
#   - manual dispatch

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install workspace dependencies
        run: npm install --no-audit --fund=false

      - name: Build all workspaces
        run: npm run build

      - name: Pack TypeScript packages
        run: |
          mkdir -p release-artifacts
          for pkg in \
            @hydra-ws/core \
            @hydra-ws/market-config \
            @hydra-ws/adapters-alpaca \
            @hydra-ws/hydra-connector \
            @hydra-ws/anchoring \
            @hydra-ws/sdk
          do
            echo "::group::npm pack ${pkg}"
            npm pack --workspace "${pkg}" --pack-destination release-artifacts
            echo "::endgroup::"
          done
          ls -la release-artifacts

      - name: Build Python SDK
        working-directory: packages/sdk-python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -la dist
          mkdir -p ../../release-artifacts
          cp dist/* ../../release-artifacts/

      - name: Compose release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          cat > release-notes.md <<EOF
          # ${TAG}

          v1.0.0 release of the Hydra Wall Street Library.

          ## What's in this release

          - Deterministic price-time matching engine (\`@hydra-ws/core\`) with hash-chained event log + replay.
          - Normalized market-data adapters (synthetic + Alpaca IEX).
          - Fastify engine-server, anchoring-server, React operator UI, stdio MCP server.
          - Python SDK with embedded backtest matcher.

          ## Milestone evidence

          - [Beta Feedback Resolution](https://github.com/dextrlabs-dev/Hydra-Wall-Street-Library/blob/main/docs/BETA_FEEDBACK.md)
          - [Threat Model](https://github.com/dextrlabs-dev/Hydra-Wall-Street-Library/blob/main/docs/THREAT_MODEL.md)
          - [Fuzz Report](https://github.com/dextrlabs-dev/Hydra-Wall-Street-Library/blob/main/docs/FUZZ_REPORT.md)
          - [Runbook](https://github.com/dextrlabs-dev/Hydra-Wall-Street-Library/blob/main/docs/RUNBOOK.md)
          - [Documentation site](https://dextrlabs-dev.github.io/Hydra-Wall-Street-Library/)

          ## Attached artefacts

          Every \`@hydra-ws/*\` workspace is attached as an \`npm pack\` tarball plus the Python SDK
          wheel + sdist. Consumers can \`npm install ./<tarball>\` or \`pip install ./<wheel>\` without
          touching the npm or PyPI registries.
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
