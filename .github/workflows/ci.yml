name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ts:
    name: TypeScript build + tests + scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install
        run: npm install --no-audit --fund=false
      - name: Build all workspaces
        run: npm run build
      - name: Unit tests (hydra-connector + market-config)
        run: npm test
      - name: scenario-trade.mjs
        run: node examples/scenario-trade.mjs
      - name: anchor-once.mjs (mock Hydra)
        run: node examples/anchor-once.mjs

  python:
    name: Python SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install Python SDK
        working-directory: packages/sdk-python
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pytest
        working-directory: packages/sdk-python
        run: pytest -q

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build engine-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: hydra-ws/engine:ci
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          load: true
          tags: hydra-ws/web:ci
