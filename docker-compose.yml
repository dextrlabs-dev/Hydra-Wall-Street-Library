version: "3.9"

services:
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: hydra-ws/engine:dev
    ports:
      - "8080:8080"
    environment:
      ENGINE_PORT: "8080"
    command: ["node", "apps/engine-server/dist/server.js", "--port", "8080", "--markets", "markets/*", "--anchor"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: hydra-ws/web:dev
    depends_on:
      - engine
    ports:
      - "8081:80"

  # Uncomment and configure to attach a real hydra-node alongside the engine.
  # hydra-node:
  #   image: ghcr.io/cardano-scaling/hydra-node:0.20.0
  #   command: ["--api-port", "4001"]
  #   ports:
  #     - "4001:4001"
