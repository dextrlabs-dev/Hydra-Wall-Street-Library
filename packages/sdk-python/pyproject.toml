[project]
name = "hydra-ws-sdk"
version = "0.1.0"
description = "Python SDK for Hydra Wall Street Library: HTTP/WS engine client + embedded matcher"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
]

[project.optional-dependencies]
ws = [
    "websockets>=13",
]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "websockets>=13",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["hydra_ws_sdk*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
